{{- if not .Values.config.existingSecret }}
{{- $name := printf "%s-secret" (include "misp.fullname" .) -}}
{{- $s := .Values.config.secrets | default dict -}}
{{- $e := lookup "v1" "Secret" .Release.Namespace $name -}}
{{- /*
  Per-key value resolution, highest priority first:
    1. Inline value in config.secrets.* (deterministic — recommended with ArgoCD,
       whose `lookup` is unreliable during diff/sync and otherwise re-rolls randoms).
    2. Existing in-cluster Secret (preserves a previously generated value on upgrade).
    3. Freshly generated random.
*/ -}}
{{- $mysqlRoot := $s.mysqlRootPassword | default "" -}}
{{- $mysql := $s.mysqlPassword | default "" -}}
{{- $adminPw := $s.adminPassword | default "" -}}
{{- $adminKey := $s.adminKey | default "" -}}
{{- $gpg := $s.gpgPassphrase | default "" -}}
{{- $enc := $s.encryptionKey | default "" -}}
{{- $salt := $s.salt | default "" -}}
{{- if $e -}}
{{- if and (not $mysqlRoot) (hasKey $e.data "mysql-root-password") }}{{- $mysqlRoot = index $e.data "mysql-root-password" | b64dec -}}{{- end -}}
{{- if and (not $mysql) (hasKey $e.data "mysql-password") }}{{- $mysql = index $e.data "mysql-password" | b64dec -}}{{- end -}}
{{- if and (not $adminPw) (hasKey $e.data "admin-password") }}{{- $adminPw = index $e.data "admin-password" | b64dec -}}{{- end -}}
{{- if and (not $adminKey) (hasKey $e.data "admin-key") }}{{- $adminKey = index $e.data "admin-key" | b64dec -}}{{- end -}}
{{- if and (not $gpg) (hasKey $e.data "gpg-passphrase") }}{{- $gpg = index $e.data "gpg-passphrase" | b64dec -}}{{- end -}}
{{- if and (not $enc) (hasKey $e.data "encryption-key") }}{{- $enc = index $e.data "encryption-key" | b64dec -}}{{- end -}}
{{- if and (not $salt) (hasKey $e.data "salt") }}{{- $salt = index $e.data "salt" | b64dec -}}{{- end -}}
{{- end -}}
{{- if not $mysqlRoot }}{{- $mysqlRoot = randAlphaNum 32 -}}{{- end -}}
{{- if not $mysql }}{{- $mysql = randAlphaNum 32 -}}{{- end -}}
{{- if not $adminPw }}{{- $adminPw = randAlphaNum 20 -}}{{- end -}}
{{- if not $adminKey }}{{- $adminKey = randAlphaNum 40 | lower -}}{{- end -}}
{{- if not $gpg }}{{- $gpg = randAlphaNum 24 -}}{{- end -}}
{{- if not $enc }}{{- $enc = randAlphaNum 32 -}}{{- end -}}
{{- if not $salt }}{{- $salt = randAlphaNum 32 -}}{{- end -}}
# Chart-managed secrets. Resolution per key: inline config.secrets.* > existing
# in-cluster Secret (lookup) > generated random. Set config.secrets inline when you
# have no secret manager and run ArgoCD (lookup re-rolls randoms on sync otherwise).
# Provide config.existingSecret in production (ESO/Vault).
apiVersion: v1
kind: Secret
metadata:
  name: {{ $name }}
  labels:
    {{- include "misp.labels" . | nindent 4 }}
type: Opaque
stringData:
  mysql-root-password: {{ $mysqlRoot | quote }}
  mysql-password: {{ $mysql | quote }}
  admin-password: {{ $adminPw | quote }}
  admin-key: {{ $adminKey | quote }}
  gpg-passphrase: {{ $gpg | quote }}
  encryption-key: {{ $enc | quote }}
  salt: {{ $salt | quote }}
{{- end }}
