{{- if not .Values.config.existingSecret }}
{{- $name := printf "%s-secret" (include "misp.fullname" .) -}}
{{- $e := lookup "v1" "Secret" .Release.Namespace $name -}}
{{- $mysqlRoot := randAlphaNum 32 -}}
{{- $mysql := randAlphaNum 32 -}}
{{- $adminPw := randAlphaNum 20 -}}
{{- $adminKey := randAlphaNum 40 | lower -}}
{{- $gpg := randAlphaNum 24 -}}
{{- $enc := randAlphaNum 32 -}}
{{- $salt := randAlphaNum 32 -}}
{{- if $e -}}
{{- if hasKey $e.data "mysql-root-password" }}{{- $mysqlRoot = index $e.data "mysql-root-password" | b64dec -}}{{- end -}}
{{- if hasKey $e.data "mysql-password" }}{{- $mysql = index $e.data "mysql-password" | b64dec -}}{{- end -}}
{{- if hasKey $e.data "admin-password" }}{{- $adminPw = index $e.data "admin-password" | b64dec -}}{{- end -}}
{{- if hasKey $e.data "admin-key" }}{{- $adminKey = index $e.data "admin-key" | b64dec -}}{{- end -}}
{{- if hasKey $e.data "gpg-passphrase" }}{{- $gpg = index $e.data "gpg-passphrase" | b64dec -}}{{- end -}}
{{- if hasKey $e.data "encryption-key" }}{{- $enc = index $e.data "encryption-key" | b64dec -}}{{- end -}}
{{- if hasKey $e.data "salt" }}{{- $salt = index $e.data "salt" | b64dec -}}{{- end -}}
{{- end }}
# Chart-managed secrets (generated once, preserved across upgrades via lookup).
# Provide config.existingSecret in production (ESO/Vault).
apiVersion: v1
kind: Secret
metadata:
  name: {{ $name }}
  labels:
    {{- include "misp.labels" . | nindent 4 }}
type: Opaque
stringData:
  mysql-root-password: {{ $mysqlRoot | quote }}
  mysql-password: {{ $mysql | quote }}
  admin-password: {{ $adminPw | quote }}
  admin-key: {{ $adminKey | quote }}
  gpg-passphrase: {{ $gpg | quote }}
  encryption-key: {{ $enc | quote }}
  salt: {{ $salt | quote }}
{{- end }}
